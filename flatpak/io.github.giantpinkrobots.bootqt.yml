app-id: io.github.giantpinkrobots.bootqt
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
base: io.qt.PySide.BaseApp
base-version: '6.10'

command: bootqt-launch.sh

finish-args:
  - --device=all
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --filesystem=host
  - --talk-name=org.freedesktop.Flatpak
  - --share=network # This is needed for the ISO image downloader functionality.

cleanup-commands:
  - /app/cleanup-BaseApp.sh
  - rm -rf /app/lib/python3.*/site-packages/OpenGL
  - rm -rf /app/lib/python3.*/site-packages/PySide6/examples
  - rm -rf /app/lib/python3.*/site-packages/pyside6_examples*
build-options:
  env:
    - BASEAPP_REMOVE_WEBENGINE=1
  
modules:
  - name: bootqt
    buildsystem: meson
    sources:
      - type: dir
        path: "./../"